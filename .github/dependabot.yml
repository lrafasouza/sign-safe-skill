version: 2
updates:
  # Keep GitHub Actions fresh. Actions are pinned to commit SHAs in the
  # workflows; Dependabot bumps the SHA (and the trailing # vN comment) so
  # pinning never goes stale.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # The runtime core has zero dependencies; this covers dev/test tooling
  # (TypeScript, vitest, Stryker, fast-check, the optional SDK peers).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    groups:
      dev-dependencies:
        patterns:
          - "*"
