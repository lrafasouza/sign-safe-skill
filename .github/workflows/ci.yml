name: ci

# Reproducible, offline verification of the deterministic signing gate.
# Runs the full test suite (golden + cross-validation against @solana/web3.js +
# determinism + fail-closed + banned-phrase + behavioral guards) on a clean
# install. No network calls are made by the core or the tests themselves.

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: this workflow only reads the repo to build + test.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Clean, lockfile-faithful install -- the reproducible entry a fresh
      # reviewer uses. Fails if package-lock.json and package.json disagree.
      - name: Install (clean)
        run: npm ci

      # One-command evaluator gate: build, vitest suite, fixture runner,
      # attack replay pack, package dry-run, and production dependency audit.
      - name: Verify all
        run: npm run verify:all

      # Determinism gate: the deterministic node runner's output must be
      # byte-for-byte identical across two runs (it prints no timing, unlike
      # vitest). A non-deterministic core would silently break golden review.
      - name: Determinism (two runs, byte-identical)
        run: |
          npm run test:fixtures > /tmp/run1.txt
          npm run test:fixtures > /tmp/run2.txt
          diff /tmp/run1.txt /tmp/run2.txt

      # Guard against blind golden regeneration: regenerating the fixtures from
      # @solana/web3.js must NOT change any committed .b64 (the generator is
      # deterministic). gen-fixtures only writes .b64 (the goldens are written by
      # the separate, reviewed `gen-goldens`), so the guard is scoped to .b64 --
      # if the wire bytes drift, a fixture and its golden could be co-rewritten
      # and the cross-check would be meaningless.
      - name: Fixtures are reproducible (no silent drift)
        run: |
          npm run gen-fixtures
          if ! git diff --quiet -- 'skill/fixtures/*.b64'; then
            echo "ERROR: gen-fixtures changed committed .b64 fixtures; the wire bytes are drifting." >&2
            git --no-pager diff -- 'skill/fixtures/*.b64'
            exit 1
          fi
